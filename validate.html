<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Device Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0b111e; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: white; font-family: 'Segoe UI', sans-serif; }
        
        .loader-container { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        
        /* الدائرة المتحركة - أزرق Novaton */
        .circle {
            position: absolute;
            width: 100%; height: 100%;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top: 4px solid #0088cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* أيقونة الجهاز */
        .device { width: 50px; height: 85px; border: 3px solid white; border-radius: 8px; position: relative; transition: all 0.6s ease; }
        .device::after { content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; }

        /* عند النجاح: اللون الأخضر الثابت */
        .success .circle { border-color: #2ecc71; border-top-color: #2ecc71; animation: none; transform: scale(1.05); }
        .success .device { border-color: #2ecc71; }
        .success .device::after { border-color: #2ecc71; }

        .text { font-size: 18px; font-weight: 600; color: #ffffff; letter-spacing: 0.5px; margin-top: 10px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body id="body">
    <div class="loader-container" id="container">
        <div class="circle" id="circle"></div>
        <div class="device" id="device"></div>
    </div>
    <div class="text">Device Verification</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function performDeepScan() {
            // جمع بيانات بصمة الجهاز لمنع التعدد
            const fingerprint = {
                ua: navigator.userAgent,
                screen: `${screen.width}x${screen.height}`,
                cores: navigator.hardwareConcurrency,
                mem: navigator.deviceMemory || "N/A",
                lang: navigator.language,
                tz: Intl.DateTimeFormat().resolvedOptions().timeZone
            };

            // تشفير البصمة لإرسالها للبوت
            const deviceId = btoa(JSON.stringify(fingerprint)).substring(0, 32);

            // محاكاة وقت الفحص (3.5 ثانية)
            setTimeout(() => {
                document.getElementById('container').classList.add('success');
                
                setTimeout(() => {
                    // إرسال البيانات النهائية للبوت
                    tg.sendData(JSON.stringify({
                        status: "VERIFIED",
                        hwid: deviceId,
                        timezone: fingerprint.tz
                    }));
                    tg.close();
                }, 1200);
            }, 3500);
        }

        window.onload = performDeepScan;
    </script>
</body>
</html>
