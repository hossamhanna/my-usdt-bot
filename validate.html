<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0b111e; color: white; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { width: 100px; height: 100px; border: 5px solid #0088cc; border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>جاري فحص بصمة الجهاز...</h2>
    <p>بروتوكول حماية Novaton نشط 🛡️</p>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        setTimeout(() => { tg.sendData("verified"); tg.close(); }, 3000);
    </script>
</body>
</html>
