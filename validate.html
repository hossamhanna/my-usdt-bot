<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b111e; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .circle { width: 150px; height: 150px; border: 4px solid rgba(255,255,255,0.05); border-top: 4px solid #0088cc; border-radius: 50%; animation: spin 1s infinite linear; transition: 0.5s; }
        .success .circle { border-color: #2ecc71; animation: none; }
        .device-icon { width: 45px; height: 80px; border: 3px solid white; border-radius: 8px; position: absolute; transition: 0.5s; }
        .success .device-icon { border-color: #2ecc71; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .status { margin-top: 25px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body id="b">
    <div style="position:relative; display:flex; align-items:center; justify-content:center;">
        <div class="circle"></div>
        <div class="device-icon"></div>
    </div>
    <div class="status">DEVICE VERIFICATION</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        setTimeout(() => {
            document.getElementById('b').classList.add('success');
            setTimeout(() => {
                const hwid = btoa(navigator.userAgent + screen.width).substring(0, 20);
                tg.sendData(JSON.stringify({ status: "OK", hwid: hwid }));
                tg.close();
            }, 1000);
        }, 3500);
    </script>
</body>
</html>
