<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novaton Shield</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .shield-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
        }

        /* حلقة التحميل المتحركة */
        .loader {
            width: 100%;
            height: 100%;
            border: 3px solid rgba(52, 152, 219, 0.1);
            border-top: 3px solid #0088cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .shield-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-list {
            width: 80%;
            text-align: left;
            margin-top: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
            opacity: 0.3;
            transition: opacity 0.5s;
        }

        .status-item.active { opacity: 1; }
        .status-item.done { color: #2ecc71; opacity: 1; }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #0088cc;
            border-radius: 50%;
            margin-right: 15px;
        }

        .done .dot { background-color: #2ecc71; }

        .progress-bar-container {
            width: 80%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0088cc, #2ecc71);
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div class="shield-container">
        <div class="loader"></div>
        <div class="shield-icon">🛡️</div>
    </div>

    <h2 id="main-title">جاري فحص الأمان...</h2>

    <div class="status-list">
        <div id="step1" class="status-item"><div class="dot"></div> فحص عنوان الـ IP والـ VPN...</div>
        <div id="step2" class="status-item"><div class="dot"></div> فحص بصمة الجهاز الرقمية...</div>
        <div id="step3" class="status-item"><div class="dot"></div> تشفير بيانات الجلسة...</div>
    </div>

    <div class="progress-bar-container">
        <div id="progress" class="progress-fill"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const steps = [
            { id: 'step1', time: 1500, title: 'فحص الاتصال...' },
            { id: 'step2', time: 3000, title: 'تأمين الحساب...' },
            { id: 'step3', time: 4500, title: 'اكتمل الفحص!' }
        ];

        steps.forEach((step, index) => {
            setTimeout(() => {
                const el = document.getElementById(step.id);
                el.classList.add('active');
                document.getElementById('main-title').innerText = step.title;
                document.getElementById('progress').style.width = ((index + 1) / steps.length * 100) + '%';
                
                if (index > 0) document.getElementById(steps[index-1].id).classList.add('done');
                
                if (index === steps.length - 1) {
                    setTimeout(() => {
                        el.classList.add('done');
                        tg.close(); // إغلاق التطبيق والعودة للبوت
                    }, 1000);
                }
            }, step.time);
        });
    </script>
</body>
</html>
