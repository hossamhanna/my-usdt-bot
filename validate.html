<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b111e; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .circle { width: 140px; height: 140px; border: 4px solid rgba(255,255,255,0.05); border-top: 4px solid #0088cc; border-radius: 50%; animation: spin 1s infinite linear; transition: 0.5s; }
        .success .circle { border-color: #2ecc71; animation: none; }
        .device { width: 40px; height: 70px; border: 3px solid white; border-radius: 6px; position: absolute; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .text { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body id="b">
    <div style="position:relative; display:flex; align-items:center; justify-content:center;">
        <div class="circle"></div>
        <div class="device"></div>
    </div>
    <div class="text">Device Verification</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        setTimeout(() => {
            document.getElementById('b').classList.add('success');
            setTimeout(() => {
                // إرسال بصمة جهاز بسيطة لمنع التعدد
                const hwid = btoa(navigator.userAgent).substring(0, 16);
                tg.sendData(JSON.stringify({ hwid: hwid }));
                tg.close();
            }, 1000);
        }, 3000);
    </script>
</body>
</html>
