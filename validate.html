<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novaton Protection</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0b111e; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .circle { width: 150px; height: 150px; border: 3px solid rgba(0,136,204,0.1); border-top: 3px solid #0088cc; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .info { margin-top: 20px; text-align: center; }
        .line { width: 80%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 20px; position: relative; overflow: hidden; }
        .line::after { content: ''; position: absolute; width: 40%; height: 100%; background: #0088cc; animation: load 1.5s infinite; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
    </style>
</head>
<body>
    <div class="circle"></div>
    <div class="info">
        <h3>جاري فحص بروتوكول الأمان...</h3>
        <p style="color: #8e95a3; font-size: 14px;">يتم الآن ربط بصمة الجهاز بحسابك</p>
    </div>
    <div class="line"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        setTimeout(() => {
            tg.close(); // العودة للبوت بعد 3 ثواني من الفحص
        }, 3500);
    </script>
</body>
</html>
