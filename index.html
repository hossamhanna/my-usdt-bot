<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>نظام التحقق من الأمان</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="status">جاري فحص الجهاز والشبكة...</div>

    <script>
        // 1. إعدادات Firebase (يجب نسخها من لوحة تحكم Firebase الخاصة بك)
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "novaton-bot.firebaseapp.com",
            databaseURL: "https://novaton-bot-default-rtdb.firebaseio.com",
            projectId: "novaton-bot",
            storageBucket: "novaton-bot.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);

        // 2. جلب معرف المستخدم من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('tgWebAppStartParam');

        async function verify() {
            const statusDiv = document.getElementById("status");
            
            try {
                // فحص الـ IP وكشف الـ VPN/Proxy
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                if (data.security && (data.security.vpn || data.security.proxy)) {
                    statusDiv.innerText = "❌ عذراً، استخدام VPN غير مسموح به!";
                    return;
                }

                const userIp = data.ip;

                // منع التعدد: التأكد أن الـ IP غير مسجل لحساب آخر
                const ipRef = firebase.database().ref('used_ips/' + userIp.replace(/\./g, '_'));
                const snapshot = await ipRef.once('value');

                if (snapshot.exists() && snapshot.val() !== userId) {
                    statusDiv.innerText = "❌ هذا الجهاز أو الشبكة مسجلة مسبقاً بحساب آخر!";
                } else {
                    // تحديث حالة المستخدم في قاعدة البيانات لفتح البوت
                    await firebase.database().ref('users/' + userId).update({
                        is_verified: true,
                        ip: userIp
                    });
                    // حجز الـ IP لهذا المستخدم
                    await ipRef.set(userId);

                    statusDiv.innerText = "✅ تم التحقق بنجاح! يمكنك العودة للبوت الآن واستخدام الأزرار.";
                }
            } catch (error) {
                statusDiv.innerText = "❌ حدث خطأ أثناء الفحص، يرجى المحاولة لاحقاً.";
            }
        }

        if (userId) verify();
        else document.getElementById("status").innerText = "⚠️ يرجى فتح الرابط من داخل البوت الرسمي.";
    </script>
</body>
</html>
