<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a232e; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #3498db; width: 120px; height: 120px; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .progress-container { width: 80%; height: 8px; background: #333; margin: 20px auto; border-radius: 10px; }
        .progress-bar { width: 0%; height: 100%; background: #3498db; border-radius: 10px; transition: width 3s; }
        button { background: #3498db; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 16px; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="loader">📱</div>
    <h2 id="status">Device Verification</h2>
    <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
    <p id="msg">Scanning your device...</p>
    <button id="btn" onclick="window.Telegram.WebApp.close()">Continue to Bot</button>

    <script>
        setTimeout(() => {
            document.getElementById('bar').style.width = '100%';
            setTimeout(() => {
                document.getElementById('status').innerText = "Already Verified";
                document.getElementById('msg').innerText = "This account is already verified.";
                document.getElementById('btn').style.display = "inline-block";
            }, 3000);
        }, 500);
    </script>
</body>
</html>
